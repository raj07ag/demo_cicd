name: demo ci-cd pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t iris-model:latest .

      - name: Run Container Tests
        run: docker run iris-model:latest pytest tests/
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login into Docker Hub
        uses: docker/login-actions@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_PASSWORD}}

      - name: Build and push to Docker Hub
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/irsi-model:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/iris-model:latest
